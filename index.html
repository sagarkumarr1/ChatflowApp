<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChatFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8eaf6;
    --text2: #8b90b8;
    --green: #4ade80;
    --red: #f87171;
    --msg-me: #3730a3;
    --msg-other: #1e2235;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 16px;
    --radius-sm: 8px;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; padding: 24px; gap: 24px;
  }
  .auth-logo { text-align: center; }
  .auth-logo .logo-icon {
    width: 72px; height: 72px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px; font-size: 32px;
  }
  .auth-logo h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .auth-logo p { color: var(--text2); font-size: 14px; margin-top: 4px; }

  .auth-tabs { display: flex; background: var(--surface); border-radius: var(--radius); padding: 4px; width: 100%; max-width: 360px; }
  .auth-tab {
    flex: 1; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--text2); transition: all 0.2s;
  }
  .auth-tab.active { background: var(--accent); color: white; }

  .auth-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
  .auth-form input {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; color: var(--text); font-size: 15px; outline: none; transition: border 0.2s;
    font-family: var(--font);
  }
  .auth-form input:focus { border-color: var(--accent); }
  .auth-form input::placeholder { color: var(--text2); }

  .btn {
    padding: 14px; border-radius: var(--radius-sm); border: none; cursor: pointer;
    font-size: 15px; font-weight: 600; transition: all 0.2s; font-family: var(--font);
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5b52e8; }
  .btn-primary:active { transform: scale(0.98); }

  .auth-error {
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--red);
    display: none;
  }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; height: 100dvh; }

  .topbar {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border); min-height: 60px;
  }
  .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .back-btn { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; display: none; font-size: 20px; }
  .logout-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; padding: 4px; }
  .ws-status { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .ws-status.connected { background: var(--green); }

  /* Notification bell */
  .notif-btn {
    background: none; border: none; cursor: pointer; font-size: 20px; padding: 4px;
    position: relative;
  }
  .notif-badge {
    position: absolute; top: -2px; right: -2px; background: var(--red); color: white;
    font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .notif-badge.show { display: flex; }

  /* Notification permission banner */
  .notif-banner {
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(167,139,250,0.1));
    border-bottom: 1px solid rgba(108,99,255,0.3);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  }
  .notif-banner span { flex: 1; font-size: 13px; color: var(--text2); }
  .notif-banner button {
    background: var(--accent); color: white; border: none; border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .notif-banner .dismiss { background: transparent; color: var(--text2); border: none; cursor: pointer; font-size: 16px; padding: 2px; }

  .conn-banner { background: rgba(248,113,113,0.1); border-bottom: 1px solid rgba(248,113,113,0.2); padding: 8px 16px; font-size: 13px; color: var(--red); text-align: center; display: none; }

  /* ── ROOMS VIEW ── */
  #rooms-view { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

  .room-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px;
  }
  .room-card:hover, .room-card:active { background: var(--surface2); border-color: var(--accent); }
  .room-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .room-info { flex: 1; min-width: 0; }
  .room-name { font-size: 16px; font-weight: 600; }
  .room-desc { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-unread { background: var(--accent); color: white; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; padding: 0 5px; }
  .room-unread.show { display: flex; }

  .create-room-form { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .create-room-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; font-family: var(--font); }
  .create-room-form input:focus { border-color: var(--accent); }
  .create-room-form input::placeholder { color: var(--text2); }

  /* ── CHAT VIEW ── */
  #chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }

  .online-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto; min-height: 48px; }
  .online-panel::-webkit-scrollbar { height: 0; }
  .online-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .online-user { display: flex; align-items: center; gap: 5px; background: var(--surface2); border-radius: 20px; padding: 4px 10px; white-space: nowrap; }
  .online-user .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
  .online-user span { font-size: 12px; font-weight: 500; }

  .messages-area { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .messages-area::-webkit-scrollbar { width: 0; }

  .msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.other { align-self: flex-start; align-items: flex-start; }
  .msg-username { font-size: 11px; color: var(--text2); margin-bottom: 3px; padding: 0 4px; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.45; word-break: break-word; max-width: 100%; }
  .msg-wrap.me .msg-bubble { background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
  .msg-wrap.other .msg-bubble { background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--text2); margin-top: 3px; padding: 0 4px; }

  .system-msg { text-align: center; font-size: 12px; color: var(--text2); padding: 6px 12px; background: rgba(108,99,255,0.08); border-radius: 20px; margin: 4px auto; }

  /* New message indicator */
  .new-msg-indicator {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer; display: none; z-index: 10;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
  }

  .typing-indicator { display: none; align-items: center; gap: 8px; padding: 8px 16px; font-size: 13px; color: var(--text2); }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-area { padding: 10px 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 10px; }
  #msg-input { flex: 1; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px; padding: 11px 16px; color: var(--text); font-size: 15px; outline: none; resize: none; max-height: 120px; font-family: var(--font); line-height: 1.4; transition: border 0.2s; }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text2); }

  .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .send-btn:hover { background: #5b52e8; }
  .send-btn:active { transform: scale(0.92); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* In-app notification popup */
  .in-app-notif {
    position: fixed; top: 70px; left: 12px; right: 12px; z-index: 998;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); transform: translateY(-120px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }
  .in-app-notif.show { transform: translateY(0); }
  .in-app-notif-icon { font-size: 28px; flex-shrink: 0; }
  .in-app-notif-body { flex: 1; min-width: 0; }
  .in-app-notif-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .in-app-notif-msg { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .in-app-notif-time { font-size: 11px; color: var(--text2); flex-shrink: 0; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text2); padding: 32px; text-align: center; }
  .empty-state .icon { font-size: 48px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Pulse animation for new notification */
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .notif-btn.pulse { animation: pulse 0.4s ease; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="logo-icon">💬</div>
    <h1>ChatFlow</h1>
    <p>Real-time chat, instantly</p>
  </div>

  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
    <div class="auth-tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div class="auth-form" id="auth-form">
    <input type="text" id="username-field" placeholder="Username" style="display:none">
    <input type="email" id="email-field" placeholder="Email address">
    <input type="password" id="password-field" placeholder="Password">
    <div class="auth-error" id="auth-error"></div>
    <button class="btn btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Top Bar -->
  <div class="topbar">
    <button class="back-btn" id="back-btn" onclick="goBack()">←</button>
    <div style="flex:1;min-width:0;">
      <div class="topbar-title" id="topbar-title">ChatFlow</div>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <div class="ws-status" id="ws-status"></div>

    <!-- Notification bell with badge -->
    <button class="notif-btn" id="notif-btn" onclick="toggleNotifications()" title="Notifications">
      🔔
      <div class="notif-badge" id="notif-badge">0</div>
    </button>

    <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
  </div>

  <!-- Notification permission banner -->
  <div id="notif-banner" class="notif-banner" style="display:none;">
    <span>🔔 Enable notifications for new messages</span>
    <button onclick="enableNotifications()">Enable</button>
    <button class="dismiss" onclick="dismissNotifBanner()">×</button>
  </div>

  <div class="conn-banner" id="conn-banner">Connection lost. Reconnecting...</div>

  <!-- ROOMS VIEW -->
  <div id="rooms-view">
    <div class="section-label">Your Rooms</div>
    <div id="rooms-list"></div>
    <div class="section-label" style="margin-top:8px;">Create New Room</div>
    <div class="create-room-form">
      <input type="text" id="room-name-input" placeholder="Room name (e.g. general)">
      <input type="text" id="room-desc-input" placeholder="Description (optional)">
      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view" style="position:relative;">
    <div class="online-panel" id="online-panel">
      <span class="online-label">Online:</span>
      <div id="online-users-list"></div>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <div class="new-msg-indicator" id="new-msg-indicator" onclick="scrollToBottom()">↓ New messages</div>
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typing-text"></span>
    </div>
    <div class="input-area">
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- In-app notification popup -->
<div class="in-app-notif" id="in-app-notif" onclick="handleNotifClick()">
  <div class="in-app-notif-icon" id="notif-icon">💬</div>
  <div class="in-app-notif-body">
    <div class="in-app-notif-title" id="notif-title"></div>
    <div class="in-app-notif-msg" id="notif-msg"></div>
  </div>
  <div class="in-app-notif-time" id="notif-time"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://chatflowapi.onrender.com';
let token = localStorage.getItem('cf_token') || '';
let currentUser = JSON.parse(localStorage.getItem('cf_user') || 'null');
let currentRoom = null;
let ws = null;
let wsReconnectTimer = null;
let typingTimer = null;
let isTyping = false;
let typingUsers = {};
let authMode = 'login';
let unreadCount = 0;
let roomUnread = {};
let notifDismissed = localStorage.getItem('notif_dismissed') === 'true';
let inAppNotifTimer = null;
let lastNotifRoom = null;
let notifEnabled = Notification.permission === 'granted';
let isScrolledToBottom = true;

// ── INIT ──
window.onload = () => {
  if (token && currentUser) showApp();
  setupTextarea();
  setupScrollDetect();
};

function setupTextarea() {
  const ta = document.getElementById('msg-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    handleTyping();
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

function setupScrollDetect() {
  const area = document.getElementById('messages-area');
  area.addEventListener('scroll', () => {
    const threshold = 100;
    isScrolledToBottom = area.scrollHeight - area.scrollTop - area.clientHeight < threshold;
    if (isScrolledToBottom) {
      document.getElementById('new-msg-indicator').style.display = 'none';
    }
  });
}

// ── AUTH ──
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='register'&&i===1)));
  document.getElementById('username-field').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-error').style.display = 'none';
}

async function handleAuth() {
  const email = document.getElementById('email-field').value.trim();
  const password = document.getElementById('password-field').value;
  const username = document.getElementById('username-field').value.trim();
  const btn = document.getElementById('auth-btn');

  if (!email || !password) { showAuthError('Please fill all fields'); return; }
  btn.textContent = '...'; btn.disabled = true;

  try {
    if (authMode === 'register') {
      if (!username) { showAuthError('Username required'); btn.textContent = 'Create Account'; btn.disabled = false; return; }
      const res = await fetch(`${API}/api/users/register`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, email, password})
      });
      const data = await res.json();
      if (!res.ok) { showAuthError(data.detail || 'Registration failed'); btn.textContent = 'Create Account'; btn.disabled = false; return; }
    }

    const res = await fetch(`${API}/api/users/login`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.detail || 'Invalid credentials'); btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account'; btn.disabled = false; return; }

    token = data.access_token;
    localStorage.setItem('cf_token', token);
    const meRes = await fetch(`${API}/api/users/me`, { headers: {'Authorization': `Bearer ${token}`} });
    currentUser = await meRes.json();
    localStorage.setItem('cf_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) {
    showAuthError('Network error. Check connection.');
    btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
    btn.disabled = false;
  }
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  disconnectWS();
  token = ''; currentUser = null; currentRoom = null;
  localStorage.removeItem('cf_token'); localStorage.removeItem('cf_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('email-field').value = '';
  document.getElementById('password-field').value = '';
  document.getElementById('auth-error').style.display = 'none';
  unreadCount = 0; updateBadge();
}

// ── APP ──
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topbar-title').textContent = 'ChatFlow';
  document.getElementById('topbar-sub').textContent = currentUser?.username || '';
  loadRooms();
  // Show notification banner if not granted and not dismissed
  if (Notification.permission === 'default' && !notifDismissed) {
    document.getElementById('notif-banner').style.display = 'flex';
  }
}

// ── NOTIFICATIONS ──
async function enableNotifications() {
  const permission = await Notification.requestPermission();
  notifEnabled = permission === 'granted';
  document.getElementById('notif-banner').style.display = 'none';
  if (notifEnabled) {
    showToast('🔔 Notifications enabled!');
  } else {
    showToast('Notifications blocked in browser settings');
  }
}

function dismissNotifBanner() {
  document.getElementById('notif-banner').style.display = 'none';
  localStorage.setItem('notif_dismissed', 'true');
  notifDismissed = true;
}

function toggleNotifications() {
  if (Notification.permission === 'default') {
    enableNotifications();
  } else if (Notification.permission === 'granted') {
    showToast('🔔 Notifications are enabled');
  } else {
    showToast('Enable notifications in browser settings');
  }
  // Clear badge
  unreadCount = 0;
  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('notif-badge');
  if (unreadCount > 0) {
    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
  // Update page title
  if (unreadCount > 0) {
    document.title = `(${unreadCount}) ChatFlow`;
  } else {
    document.title = 'ChatFlow';
  }
}

function showInAppNotification(username, content, roomName, roomId) {
  // Don't show if we're in the same room and it's visible
  if (currentRoom?.id === roomId && !document.hidden) return;

  document.getElementById('notif-title').textContent = `${username} in #${roomName}`;
  document.getElementById('notif-msg').textContent = content;
  document.getElementById('notif-time').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  lastNotifRoom = roomId;

  const el = document.getElementById('in-app-notif');
  el.classList.add('show');

  // Pulse the bell
  const bell = document.getElementById('notif-btn');
  bell.classList.add('pulse');
  setTimeout(() => bell.classList.remove('pulse'), 400);

  // Auto hide after 4 seconds
  if (inAppNotifTimer) clearTimeout(inAppNotifTimer);
  inAppNotifTimer = setTimeout(() => el.classList.remove('show'), 4000);

  // Increment badge
  unreadCount++;
  updateBadge();

  // Update room unread count
  if (!roomUnread[roomId]) roomUnread[roomId] = 0;
  roomUnread[roomId]++;
  updateRoomBadges();
}

function handleNotifClick() {
  document.getElementById('in-app-notif').classList.remove('show');
  // If there's a room to go to, go there (for now just dismiss)
}

function showBrowserNotification(username, content, roomName) {
  if (document.hidden && Notification.permission === 'granted') {
    const notif = new Notification(`${username} in #${roomName}`, {
      body: content,
      icon: '💬',
      tag: 'chatflow-msg',
      renotify: true,
    });
    notif.onclick = () => { window.focus(); notif.close(); };
    setTimeout(() => notif.close(), 5000);
  }
}

function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function updateRoomBadges() {
  Object.keys(roomUnread).forEach(roomId => {
    const el = document.getElementById(`unread-${roomId}`);
    if (el && roomUnread[roomId] > 0) {
      el.textContent = roomUnread[roomId];
      el.classList.add('show');
    }
  });
}

// ── ROOMS ──
async function loadRooms() {
  showRoomsView();
  try {
    const res = await fetch(`${API}/api/rooms/`, { headers: {'Authorization': `Bearer ${token}`} });
    if (res.status === 401) { logout(); return; }
    const rooms = await res.json();
    renderRooms(rooms);
  } catch(e) { showToast('Failed to load rooms'); }
}

function renderRooms(rooms) {
  const container = document.getElementById('rooms-list');
  if (!rooms.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🏠</div><h3>No rooms yet</h3><p>Create your first chat room below.</p></div>`;
    return;
  }
  const emojis = ['💬','🔥','⚡','🎯','🚀','💡','🎮','🌍'];
  container.innerHTML = rooms.map((r, i) => `
    <div class="room-card" onclick="joinRoom(${r.id}, '${r.name}', '${r.description||''}')">
      <div class="room-icon">${emojis[i % emojis.length]}</div>
      <div class="room-info">
        <div class="room-name"># ${r.name}</div>
        <div class="room-desc">${r.description || 'No description'}</div>
      </div>
      <div class="room-unread" id="unread-${r.id}">${roomUnread[r.id]||''}</div>
    </div>
  `).join('');
  updateRoomBadges();
}

async function createRoom() {
  const name = document.getElementById('room-name-input').value.trim();
  const desc = document.getElementById('room-desc-input').value.trim();
  if (!name) { showToast('Room name required'); return; }
  try {
    const res = await fetch(`${API}/api/rooms/`, {
      method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({name, description: desc})
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.detail || 'Failed'); return; }
    document.getElementById('room-name-input').value = '';
    document.getElementById('room-desc-input').value = '';
    showToast(`Room #${name} created! 🎉`);
    loadRooms();
  } catch(e) { showToast('Network error'); }
}

// ── CHAT ──
async function joinRoom(roomId, roomName, roomDesc) {
  currentRoom = { id: roomId, name: roomName, desc: roomDesc };

  // Clear unread for this room
  roomUnread[roomId] = 0;
  document.getElementById('topbar-title').textContent = `# ${roomName}`;
  document.getElementById('topbar-sub').textContent = roomDesc || '';
  document.getElementById('back-btn').style.display = 'block';

  showChatView();
  clearMessages();
  await loadMessageHistory(roomId);
  connectWS(roomId);
}

async function loadMessageHistory(roomId) {
  try {
    const res = await fetch(`${API}/api/rooms/${roomId}/messages`, { headers: {'Authorization': `Bearer ${token}`} });
    if (!res.ok) return;
    const messages = await res.json();
    if (messages.length) {
      clearMessages();
      messages.reverse().forEach(m => addMessage({
        type: 'message',
        content: m.content,
        username: m.sender_id === currentUser.id ? currentUser.username : `User ${m.sender_id}`,
        created_at: m.created_at
      }, false));
      scrollToBottom(true);
    }
  } catch(e) {}
}

function connectWS(roomId) {
  disconnectWS();
  ws = new WebSocket(`wss://chatflowapi.onrender.com/ws/${roomId}?token=${token}`);

  ws.onopen = () => {
    setWSStatus(true);
    document.getElementById('conn-banner').style.display = 'none';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleWSMessage(data);
  };

  ws.onclose = (e) => {
    setWSStatus(false);
    if (currentRoom && e.code !== 4001 && e.code !== 4004) {
      document.getElementById('conn-banner').style.display = 'block';
      wsReconnectTimer = setTimeout(() => connectWS(roomId), 3000);
    }
  };

  ws.onerror = () => setWSStatus(false);
}

function disconnectWS() {
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
  if (ws) { ws.close(); ws = null; }
  setWSStatus(false);
}

function handleWSMessage(data) {
  if (data.type === 'message') {
    hideTyping();
    addMessage(data);
    if (data.username !== currentUser.username) {
      delete typingUsers[data.username];
      updateTypingDisplay();
      // 🔔 Show in-app notification
      showInAppNotification(data.username, data.content, currentRoom?.name || 'Chat', currentRoom?.id);
      // 🔔 Browser notification (when tab is hidden)
      showBrowserNotification(data.username, data.content, currentRoom?.name || 'Chat');
      // 🔔 Sound
      playNotificationSound();
    }
  } else if (data.type === 'system') {
    addSystemMessage(data.content);
    if (data.online_users) updateOnlineUsers(data.online_users);
  } else if (data.type === 'typing') {
    if (data.username !== currentUser.username) {
      if (data.is_typing) typingUsers[data.username] = true;
      else delete typingUsers[data.username];
      updateTypingDisplay();
    }
  }
}

function addMessage(data, scroll = true) {
  const area = document.getElementById('messages-area');
  const empty = area.querySelector('.empty-state');
  if (empty) empty.remove();

  const isMe = data.username === currentUser.username;
  const time = data.created_at ? new Date(data.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${isMe ? 'me' : 'other'}`;
  wrap.innerHTML = `
    ${!isMe ? `<div class="msg-username">${escapeHtml(data.username)}</div>` : ''}
    <div class="msg-bubble">${escapeHtml(data.content)}</div>
    ${time ? `<div class="msg-time">${time}</div>` : ''}
  `;
  area.appendChild(wrap);

  if (scroll) {
    if (isScrolledToBottom) {
      scrollToBottom();
    } else if (!isMe) {
      // Show "new messages" indicator
      document.getElementById('new-msg-indicator').style.display = 'block';
    }
  }
}

function addSystemMessage(content) {
  const area = document.getElementById('messages-area');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = content;
  area.appendChild(el);
  if (isScrolledToBottom) scrollToBottom();
}

function clearMessages() {
  document.getElementById('messages-area').innerHTML = `
    <div class="empty-state">
      <div class="icon">👋</div><h3>Say hello!</h3>
      <p>Be the first to send a message.</p>
    </div>`;
  isScrolledToBottom = true;
  document.getElementById('new-msg-indicator').style.display = 'none';
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({type: 'message', content}));
  input.value = '';
  input.style.height = 'auto';
  stopTyping();
}

function handleTyping() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!isTyping) { isTyping = true; ws.send(JSON.stringify({type: 'typing', is_typing: true})); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (isTyping && ws && ws.readyState === WebSocket.OPEN) {
    isTyping = false;
    ws.send(JSON.stringify({type: 'typing', is_typing: false}));
  }
  clearTimeout(typingTimer);
}

function updateTypingDisplay() {
  const users = Object.keys(typingUsers);
  const el = document.getElementById('typing-indicator');
  if (!users.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  document.getElementById('typing-text').textContent = users.length === 1 ? `${users[0]} is typing...` : `${users.join(', ')} are typing...`;
}

function hideTyping() { document.getElementById('typing-indicator').style.display = 'none'; }

function updateOnlineUsers(users) {
  document.getElementById('online-users-list').innerHTML = users.map(u => `
    <div class="online-user"><div class="dot"></div><span>${escapeHtml(u)}</span></div>
  `).join('');
  document.getElementById('topbar-sub').textContent = `${users.length} online`;
}

// ── NAVIGATION ──
function showRoomsView() {
  document.getElementById('rooms-view').style.display = 'flex';
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('topbar-title').textContent = 'ChatFlow';
  document.getElementById('topbar-sub').textContent = currentUser?.username || '';
}

function showChatView() {
  document.getElementById('rooms-view').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
}

function goBack() {
  disconnectWS(); currentRoom = null; typingUsers = {};
  showRoomsView(); loadRooms();
}

// ── UTILS ──
function setWSStatus(connected) { document.getElementById('ws-status').classList.toggle('connected', connected); }

function scrollToBottom(instant = false) {
  const area = document.getElementById('messages-area');
  requestAnimationFrame(() => {
    area.scrollTo({ top: area.scrollHeight, behavior: instant ? 'instant' : 'smooth' });
  });
  isScrolledToBottom = true;
  document.getElementById('new-msg-indicator').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(text) {
  return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Page visibility — reset badge when tab focused
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { unreadCount = 0; updateBadge(); }
});

document.getElementById('password-field').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth();
});
</script>
